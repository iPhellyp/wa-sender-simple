services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: wa_sender_simple
      POSTGRES_USER: wa_sender
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  app:
    image: wa-sender-simple:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wa_sender}:${POSTGRES_PASSWORD:-wa_sender}@postgres:5432/${POSTGRES_DB:-wa_sender_simple}?schema=public
      REDIS_URL: redis://redis:6379
      BAILEYS_SESSION_DIR: /app/data/baileys-session
    depends_on:
      - postgres
      - redis
    volumes:
      - baileys_session:/app/data/baileys-session
      - uploads:/app/uploads

  worker:
    image: wa-sender-simple:latest
    restart: unless-stopped
    command: npm run worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wa_sender}:${POSTGRES_PASSWORD:-wa_sender}@postgres:5432/${POSTGRES_DB:-wa_sender_simple}?schema=public
      REDIS_URL: redis://redis:6379
      BAILEYS_SESSION_DIR: /app/data/baileys-session
    depends_on:
      - postgres
      - redis
    volumes:
      - baileys_session:/app/data/baileys-session
      - uploads:/app/uploads

volumes:
  postgres_data:
    name: wa-sender-simple_postgres_data
  baileys_session:
    name: wa-sender-simple_baileys_session
  uploads:
    name: wa-sender-simple_uploads
